# ============================================================
# STOCK — main configuration
# Every tunable parameter MUST live here, not in code.
# ============================================================

market:
  timezone: Asia/Taipei
  trading_hours: ["09:00", "13:30"]
  entry_cutoff: "09:45"
  force_exit: "13:00"

universe:
  source: static               # static | dynamic(AI-selected)
  # Phase-2 universe: 33 檔關注標的，跨多個族群。
  symbols:
    # ── 晶圓代工／封測 ──
    - "2303"  # 聯電
    - "3711"  # 日月光投控
    - "2449"  # 京元電子

    # ── AI伺服器 ODM ──
    - "2317"  # 鴻海
    - "2382"  # 廣達
    - "3231"  # 緯創
    - "2356"  # 英業達

    # ── 散熱 ──
    - "3324"  # 雙鴻（液冷）
    - "6805"  # 富世達（液冷）

    # ── 電源 ──
    - "2301"  # 光寶科
    - "2308"  # 台達電（Delta Electronics）

    # ── 網通 ──
    - "2345"  # 智邦（Accton）

    # ── PCB／載板 ──
    - "3037"  # 欣興
    - "2368"  # 金像電
    - "4958"  # 臻鼎-KY

    # ── 機構件 ──
    - "2474"  # 可成

    # ── 半導體周邊 ──
    - "2360"  # 致茂
    - "2327"  # 國巨
    - "3006"  # 晶豪科

    # ── 記憶體族群 ──
    - "2408"  # 南亞科
    - "2344"  # 華邦電
    - "2337"  # 旺宏
    - "8299"  # 群聯
    - "3260"  # 威剛

    # ── AI PC ──
    - "2357"  # 華碩
    - "2376"  # 技嘉
    - "2377"  # 微星

    # ── 機器人／所羅門 ──
    - "2359"  # 所羅門

    # ── 工業電腦 ──
    - "2395"  # 研華（Advantech）

    # ── 其他0050成分（傳產）──
    - "2603"  # 長榮（海運）
    - "1303"  # 南亞（塑膠）
    - "2002"  # 中鋼
    - "2207"  # 和泰車

  min_avg_volume_klots: 3

  # ──────────────────────────────────────────────────────────
  # 分類資訊：供 Phase 2 特徵 pipeline 輸出為 categorical 特徵，
  # 給 Phase 3 的 pooled 單一模型使用（不拆成多個模型）。
  # 階層式：asset_class 為粗分類，sectors 為細分類，兩層都餵給模型。
  # ──────────────────────────────────────────────────────────
  asset_class:
    electronics: ["2303","3711","2449","2317","2382","3231","2356","3324","6805","2301","2308","2345","3037","2368","4958","2474","2360","2327","3006","2408","2344","2337","8299","3260","2357","2376","2377","2359","2395"]
    traditional: ["2603","1303","2002","2207"]

  sectors:
    foundry_test:    ["2303","3711","2449"]
    ai_server_odm:   ["2317","2382","3231","2356"]
    cooling:         ["3324","6805"]
    power:           ["2301","2308"]
    networking:      ["2345"]
    pcb_substrate:   ["3037","2368","4958"]
    mechanical:      ["2474"]
    semi_peripheral: ["2360","2327","3006"]
    memory:          ["2408","2344","2337","8299","3260"]
    ai_pc:           ["2357","2376","2377"]
    robotics:        ["2359"]
    industrial_pc:   ["2395"]
    shipping:        ["2603"]
    plastics:        ["1303"]
    steel:           ["2002"]
    auto:            ["2207"]

features:
  vwap_window_min: 5
  momentum_windows_min: [1, 3, 5]
  volume_ratio_lookback_days: 20

signal:
  type: rule                   # rule | lgbm
  # The rule strategy is used to GENERATE TRAINING DATA, not as the final
  # trading strategy, so the conditions are intentionally loose: a signal
  # fires when at least `min_conditions_met` of 5 conditions hold, and the
  # `score` column records met/5 (the condition-satisfaction level).
  rule:
    min_conditions_met: 3        # 至少幾個條件滿足
    vol_ratio_threshold: 1.5
    momentum_3m_threshold: 0.2
    price_vs_ma20_min: -2.0
  lgbm:
    model_path: models/lgbm_entry_v0.1.pkl
    threshold: 0.65

position:
  stop_loss_pct: 1.0
  take_profit_pct: 1.7
  trailing_take_profit: true
  trailing_drawdown_pct: 0.5

risk:
  total_capital: 500000
  max_lot_per_symbol: 2
  max_lots_per_round: 1
  max_daily_loss: 10000
  max_open_positions: 5

executor:
  type: dryrun                 # dryrun | paper | notify | broker

data_feed:
  type: fake                   # fake | fugle_live | replay
  fake:
    tick_interval_ms: 200
    seed: 42
  fugle_live:
    api_key_env: FUGLE_API_KEY  # 從環境變數讀取，不要 hard-code
  replay:
    date: "2025-06-04"
    speed_multiplier: 0.0       # 0 = 全速回放，適合回測

storage:
  signals_db: db/signals.sqlite
  trades_db: db/trades.sqlite
  runs_db: db/runs.sqlite
  ticks_dir: data/ticks
  bars_dir: data/bars

logging:
  level: INFO
  file: logs/app.log

# ── Phase 2: offline feature pipeline ─────────────────────────────────────
feature_pipeline:
  ticks_dir: data/ticks                      # input root (YYYY-MM-DD sub-dirs)
  output_dir: data/features                  # per-symbol output root
  label_minutes: 3                           # future N-min return label
  pooled: false                              # also write a single pooled parquet?
  pooled_output_path: data/features/pooled.parquet
  drop_na_labels: true                       # drop rows where label is NaN
  # Normalisation strategy applied to absolute-value columns when pooling
  # across symbols with different price scales.
  # Options: none | per_symbol_zscore
  normalization_strategy: per_symbol_zscore
  # Columns that carry absolute price/volume values (not scale-invariant).
  # These are z-score normalised per symbol when normalization_strategy is set.
  absolute_value_cols:
    - last_price
    - sma5
    - ma5
    - ma20
    - ma60
    - vol_ma5
    - vol_sum_recent
